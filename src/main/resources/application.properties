# --- Database Connection (PostgreSQL on localhost) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/myappdb
spring.datasource.username=postgres
spring.datasource.password=12345

spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA and Hibernate Configuration ---
# 'update' automatically updates the DB schema to match your 'Video' entity
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional: Shows SQL queries generated by Hibernate in the console
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# --- Multipart File Upload Configuration (Crucial for Videos) ---
spring.servlet.multipart.enabled=true

# Maximum size allowed for a single file upload (e.g., 200MB)
spring.servlet.multipart.max-file-size=200MB

# Maximum size allowed for the entire request
spring.servlet.multipart.max-request-size=250MB
